{% extends 'base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">

<div class="auth-wrapper d-flex justify-content-center align-items-center">
    <div id="authCard" class="login-split-card">
        <section class="login-form-pane">
            <h2 class="form-title">Login</h2>

            {% if error %}
            <div class="form-error">{{ error }}</div>
            {% endif %}

            <form method="post" class="login-form">
                {% csrf_token %}

                <div class="mb-3">
                    <input type="text"
                           name="username"
                           class="form-control"
                           placeholder="Username"
                           required>
                </div>

                <div class="mb-3">
                    <input type="password"
                           name="password"
                           class="form-control"
                           placeholder="Password"
                           required>
                </div>

                <button type="submit" class="auth-action w-100 py-2">
                    Log In
                </button>
            </form>

            <div class="or-divider">or</div>

            <a href="{% url 'user:signup' %}"
               data-auth-transition="to-signup"
               class="auth-action secondary-action w-100 d-block text-center py-2">
                Create New Account
            </a>
        </section>

        <aside class="login-brand-pane">
            <div class="brand-logos">
                <img src="{% static 'images/OIP.webp' %}"
                     class="brand-logo"
                     alt="Official Seal">

                <img src="{% static 'images/bayawan_logo.webp' %}"
                     class="brand-logo"
                     alt="Bayawan Logo">
            </div>

            <div class="brand-copy">
                Bayawan City<br>Dog Adoption
            </div>
        </aside>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const card = document.getElementById('authCard');
    const transition = sessionStorage.getItem('authTransition');

    if (card && transition === 'to-login') {
        card.classList.add('pane-slide-to-login');
    }
    sessionStorage.removeItem('authTransition');
});
</script>

{% endblock %}

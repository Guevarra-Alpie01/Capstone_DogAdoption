{% extends 'base.html' %}
{% load static %}

{% block content %}

<!-- Signup Page CSS -->
<link rel="stylesheet" href="{% static 'css/login.css' %}">

<div class="auth-wrapper" data-home-url="{% url 'user:user_home' %}">
    <div class="auth-card">

        <h2>Create Account</h2>

        <form method="post">
            {% csrf_token %}

            <div class="mb-2">
                <input type="text" name="username" class="form-control" placeholder="Username" required>
            </div>

            <div class="mb-2">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>

            <div class="mb-2">
                <input type="text" name="first_name" class="form-control" placeholder="First Name" required>
            </div>

            <div class="mb-2">
                <input type="text" name="middle_initial" class="form-control" placeholder="Middle Initial">
            </div>

            <div class="mb-2">
                <input type="text" name="last_name" class="form-control" placeholder="Last Name" required>
            </div>

            <div class="mb-2">
                <input type="text" name="address" class="form-control" placeholder="Address" required>
            </div>

            <div class="mb-3">
                <input type="number" name="age" class="form-control" placeholder="Age" required>
            </div>

            <button type="submit" class="login-btn w-100 py-2">
                Next
            </button>

        </form>

        <div class="mt-3 text-center">
            <a href="{% url 'user:login' %}">
                Already have an account? Log in
            </a>
        </div>

    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    if (!window.matchMedia("(min-width: 992px)").matches) {
        return;
    }

    var wrapper = document.querySelector(".auth-wrapper");
    var card = document.querySelector(".auth-card");
    if (!wrapper || !card) {
        return;
    }

    wrapper.addEventListener("click", function (event) {
        if (!card.contains(event.target)) {
            var homeUrl = wrapper.getAttribute("data-home-url");
            if (homeUrl) {
                window.location.href = homeUrl;
            }
        }
    });
});
</script>

{% endblock %}

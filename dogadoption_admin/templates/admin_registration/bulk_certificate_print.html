{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Dog Vaccination Certificates</title>
    <link rel="stylesheet" href="{% static 'css/register/small_certificate.css' %}">
</head>
<body>
    <main class="small-certificate-stack">
        {% for cert in certificates %}
        <div class="bulk-meta">Certificate {{ forloop.counter }} of {{ certificates|length }}</div>
        {% include 'admin_registration/partials/small_certificate_sheet.html' %}
        {% endfor %}
    </main>

    <script>
    window.onload = function() {
        setTimeout(function() {
            window.print();
        }, 350);
    };
    </script>
</body>
</html>

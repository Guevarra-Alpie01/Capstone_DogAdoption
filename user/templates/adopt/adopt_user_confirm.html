{% extends "base.html" %}
{% block content %}

<style>
    /* ── Transparent canvas ── */
    html,
    body {
        background: transparent !important;
    }

    body {
        overflow: hidden !important;
    }

    /* ── Hide all base shell elements ── */
    .app-topbar,
    .user-sidebar-backdrop,
    .page-transition-overlay,
    #sidebar-wrapper,
    #page-content-wrapper {
        display: none !important;
    }

    /* ── Background iframe (Find a Dog page) ── */
    .modal-bg-iframe {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
        z-index: 1;
        pointer-events: none;
    }

    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(10, 18, 35, 0.35);
        backdrop-filter: blur(3px);
        -webkit-backdrop-filter: blur(3px);
        z-index: 1050;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 30px 20px;
        overflow-y: auto;
        animation: overlayFadeIn 0.3s ease;
    }

    @keyframes overlayFadeIn {
        from {
            opacity: 0;
        }

        to {
            opacity: 1;
        }
    }

    @keyframes cardSlideIn {
        from {
            opacity: 0;
            transform: translateY(30px) scale(0.96);
        }

        to {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    }

    .claim-theme-card {
        position: relative;
        border: none;
        border-radius: 28px;
        box-shadow: 0 30px 80px rgba(15, 23, 42, 0.2);
        background: #ffffff;
        overflow: hidden;
        width: 100%;
        max-width: 1080px;
        margin: auto;
        animation: cardSlideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .claim-theme-header {
        background: #ffffff;
        border-bottom: none;
        padding: 32px 32px 12px !important;
    }

    .claim-preview {
        border: none;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
        overflow: visible;
    }

    .claim-preview-profile {
        padding: 0 0 24px;
    }

    .claim-preview-image-wrapper {
        width: 100%;
        aspect-ratio: 16 / 11;
        border-radius: 20px;
        overflow: hidden;
        border: 1px solid #e2e8f0;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
    }

    .claim-preview-profile-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .claim-content {
        padding: 0 32px 32px;
    }

    .claim-theme-close {
        flex-shrink: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        margin: -8px -8px 0 0;
        padding: 0;
        border: 1px solid #2563eb;
        border-radius: 14px;
        background: linear-gradient(180deg, #4f8df7 0%, #2563eb 100%);
        color: #ffffff;
        text-decoration: none;
        transition: all 0.2s ease;
        box-shadow: 0 8px 20px rgba(37, 99, 235, 0.25);
        z-index: 10;
    }

    .claim-theme-close svg {
        width: 22px;
        height: 22px;
        stroke: currentColor;
        stroke-width: 3;
    }

    .claim-theme-close:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
        color: #ffffff;
    }

    @media (min-width: 992px) {
        .claim-layout {
            display: grid;
            grid-template-columns: 1.15fr 1fr;
            gap: 40px;
            align-items: start;
        }
    }

    .claim-preview-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        margin-bottom: 24px;
    }

    .attr-card {
        background: #f8fafc;
        border: 1px solid #edf2f7;
        border-radius: 16px;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 14px;
    }

    .attr-icon-box {
        width: 38px;
        height: 38px;
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #64748b;
        flex-shrink: 0;
    }

    .attr-content {
        min-width: 0;
    }

    .attr-label {
        display: block;
        font-size: 0.68rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #94a3b8;
        margin-bottom: 1px;
    }

    .attr-value {
        display: block;
        font-size: 0.9rem;
        font-weight: 800;
        color: #1e293b;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .attr-card--full {
        grid-column: span 2;
    }

    .claim-preview-dot {
        display: none;
    }

    .claim-preview-title {
        display: none;
    }

    /* Decorative Paws */
    .paw-decoration {
        position: absolute;
        color: #e2e8f0;
        opacity: 0.5;
        pointer-events: none;
        z-index: 0;
    }

    .paw-1 {
        top: 60px;
        right: 30px;
        font-size: 2.5rem;
        transform: rotate(15deg);
    }

    .paw-2 {
        bottom: 40px;
        right: 340px;
        font-size: 3rem;
        transform: rotate(-20deg);
    }

    .claim-summary-value a {
        color: #1d4ed8;
        text-decoration: none;
        font-weight: 600;
    }

    .claim-summary-value a:hover {
        text-decoration: underline;
    }

    .claim-form .form-label {
        margin-bottom: 4px;
        font-size: 0.9rem;
        font-weight: 600;
    }

    .claim-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
        margin-top: 24px;
        padding-top: 0;
        border-top: none;
    }

    .btn-claim-submit {
        background: #198754;
        border-color: #198754;
        color: #ffffff;
        font-weight: 800;
        padding: 12px 32px;
        border-radius: 12px;
        font-size: 1rem;
        box-shadow: 0 10px 24px rgba(25, 135, 84, 0.28);
    }

    .btn-claim-submit:hover {
        background: #157347;
        border-color: #157347;
        color: #ffffff;
        box-shadow: 0 12px 28px rgba(25, 135, 84, 0.32);
    }

    @media (min-width: 769px) {
        .claim-summary-more-btn {
            display: none !important;
        }
    }

    @media (min-width: 992px) {
        .claim-layout {
            grid-template-columns: minmax(280px, 34%) minmax(0, 1fr);
            gap: 16px;
        }

        .claim-preview {
            position: sticky;
            top: 84px;
        }
    }

    @media (max-width: 991px) {
        .claim-theme-header {
            padding: 30px 24px 12px !important;
            text-align: center;
        }

        .claim-theme-header .d-flex {
            flex-direction: column;
            align-items: center !important;
        }

        .claim-theme-close {
            position: absolute;
            top: 24px;
            right: 24px;
        }

        .claim-theme-header h2 {
            font-size: 1.5rem !important;
            margin-top: 20px;
        }

        .claim-content {
            padding: 0 24px 40px;
        }
    }

    @media (max-width: 576px) {
        .claim-preview-grid {
            grid-template-columns: 1fr;
        }

        .claim-theme-header {
            padding: 40px 16px 12px !important;
        }

        .claim-theme-header h2 {
            font-size: 1.4rem !important;
        }

        .claim-content {
            padding: 0 16px 30px;
        }

        .attr-card {
            padding: 10px 14px;
        }

        .claim-preview-image-wrapper {
            max-width: 400px;
            margin-inline: auto;
        }
    }
</style>

<iframe class="modal-bg-iframe" src="{% url 'user:adopt_list' %}" tabindex="-1" aria-hidden="true"></iframe>

<div class="modal-overlay" id="adoptUserModalOverlay">
    <div class="claim-theme-card">
        <div class="claim-theme-header">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <h2 class="mb-1 fw-bold text-dark" style="font-size: 1.75rem;">Confirm Adoption Request</h2>
                    <p class="mb-0 text-secondary" style="font-size: 0.95rem;">Please review the dog details before
                        confirming.</p>
                </div>
                <a id="adoptUserCloseLink" href="{% url 'user:adopt_list' %}" class="claim-theme-close"
                    aria-label="Close" title="Close (Esc)">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </a>
            </div>
        </div>
        <div class="claim-content">
            <div class="claim-layout">
                <div class="claim-preview">
                    {% if post.images.exists %}
                    <div class="claim-preview-profile">
                        <div class="claim-preview-image-wrapper">
                            <img src="{{ post.images.first.image.url }}" alt="{{ post.display_title }}"
                                class="claim-preview-profile-img">
                        </div>
                    </div>
                    {% endif %}
                </div>
                <div class="claim-form">
                    <form method="post" class="d-flex flex-column gap-3">
                        {% csrf_token %}
                        <div class="alert alert-info py-2 px-3 mb-0" style="border-radius: 12px; font-size: 0.9rem;">
                            <i class="bi bi-info-circle-fill me-2"></i>
                            By clicking confirm, you are expressing interest in adopting this dog.
                        </div>
                        <div class="claim-actions mt-2">
                            <button type="submit" class="btn btn-success btn-claim-submit w-100">Confirm
                                Request</button>
                            <a href="{% url 'user:adopt_list' %}" class="btn btn-outline-secondary w-100"
                                style="border-radius: 12px; padding: 12px;">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    /* Move iframe + modal to <body> so they escape the hidden #page-content-wrapper */
    (function () {
        document.addEventListener('DOMContentLoaded', function () {
            var iframe = document.querySelector('.modal-bg-iframe');
            var overlay = document.getElementById('adoptUserModalOverlay');
            if (iframe) document.body.appendChild(iframe);
            if (overlay) document.body.appendChild(overlay);
        });
    })();
</script>

<script>
    (function () {
        var list = document.getElementById("adoptUserSummaryList");
        var btn = document.getElementById("adoptUserSummaryMoreBtn");
        if (!list || !btn) {
            return;
        }
        var mq = window.matchMedia("(max-width: 768px)");
        var expanded = false;

        function applyMobileCollapseState() {
            var items = list.querySelectorAll(".claim-summary-item");
            var needsToggle = items.length > 2 && mq.matches;
            btn.hidden = !needsToggle;
            if (!mq.matches) {
                list.classList.remove("claim-summary-list--collapsed");
                expanded = false;
                btn.setAttribute("aria-expanded", "true");
                btn.textContent = "View more";
                return;
            }
            if (!needsToggle) {
                list.classList.remove("claim-summary-list--collapsed");
                expanded = false;
                return;
            }
            list.classList.toggle("claim-summary-list--collapsed", !expanded);
            btn.setAttribute("aria-expanded", expanded ? "true" : "false");
            btn.textContent = expanded ? "View less" : "View more";
        }

        btn.addEventListener("click", function () {
            if (!mq.matches) {
                return;
            }
            expanded = !expanded;
            applyMobileCollapseState();
        });

        if (typeof mq.addEventListener === "function") {
            mq.addEventListener("change", function () {
                expanded = false;
                applyMobileCollapseState();
            });
        } else if (typeof mq.addListener === "function") {
            mq.addListener(function () {
                expanded = false;
                applyMobileCollapseState();
            });
        }

        applyMobileCollapseState();
    })();

    (function () {
        var closeLink = document.getElementById("adoptUserCloseLink");
        if (!closeLink || !closeLink.getAttribute("href")) {
            return;
        }
        document.addEventListener("keydown", function (e) {
            if (e.key !== "Escape" || e.defaultPrevented) {
                return;
            }
            var t = e.target;
            var tag = t && t.tagName;
            if (tag === "TEXTAREA") {
                return;
            }
            if (tag === "INPUT") {
                var type = (t.type || "").toLowerCase();
                if (type !== "button" && type !== "submit" && type !== "reset" && type !== "checkbox" && type !== "radio") {
                    return;
                }
            }
            if (tag === "SELECT") {
                return;
            }
            window.location.href = closeLink.href;
        });
    })();
</script>

{% endblock %}

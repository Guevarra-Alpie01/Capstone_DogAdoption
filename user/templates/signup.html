{% extends 'base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">

<div class="auth-wrapper d-flex justify-content-center align-items-center">
    <div id="authCard" class="login-split-card signup-card">
        <section class="login-form-pane signup-form-pane">
            <h2 class="form-title">Create Account</h2>

            {% if error %}
            <div class="form-error">{{ error }}</div>
            {% endif %}

            <form method="post" class="login-form">
                {% csrf_token %}

                <div class="mb-2">
                    <input type="text" name="username" class="form-control" placeholder="Username" required>
                </div>

                <div class="mb-2">
                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                </div>

                <div class="mb-2">
                    <input type="text" name="first_name" class="form-control" placeholder="First Name" required>
                </div>

                <div class="mb-2">
                    <input type="text" name="middle_initial" class="form-control" placeholder="Middle Initial">
                </div>

                <div class="mb-2">
                    <input type="text" name="last_name" class="form-control" placeholder="Last Name" required>
                </div>

                <div class="mb-2">
                    <input type="text" name="address" class="form-control" placeholder="Address" required>
                </div>

                <div class="mb-3">
                    <input type="number" name="age" class="form-control" placeholder="Age" required>
                </div>

                <button type="submit" class="auth-action w-100 py-2">
                    Next
                </button>
            </form>

            <div class="or-divider">or</div>
            <a href="{% url 'user:login' %}"
               data-auth-transition="to-login"
               class="auth-action secondary-action w-100 d-block text-center py-2">
                Already have an account? Log In
            </a>
        </section>

        <aside class="login-brand-pane">
            <div class="brand-logos">
                <img src="{% static 'images/OIP.webp' %}"
                     class="brand-logo"
                     alt="Official Seal">

                <img src="{% static 'images/bayawan_logo.webp' %}"
                     class="brand-logo"
                     alt="Bayawan Logo">
            </div>

            <div class="brand-copy">
                Registration<br>Portal
            </div>
        </aside>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const card = document.getElementById('authCard');
    const transition = sessionStorage.getItem('authTransition');

    if (card && transition === 'to-signup') {
        card.classList.add('pane-slide-to-signup');
    }
    sessionStorage.removeItem('authTransition');
});
</script>

{% endblock %}

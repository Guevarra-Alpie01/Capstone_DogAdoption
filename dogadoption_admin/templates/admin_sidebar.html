{% load static %}
<div class="d-none d-lg-block" id="sidebar-wrapper">
    <div class="sidebar-inner">
        <div class="sidebar-header">
            <div class="sidebar-title">Admin Menu</div>
            <div class="sidebar-subtitle">Veterinary Services</div>
        </div>

        <div class="list-group list-group-flush sidebar-nav">
            {% with current=request.resolver_match.url_name %}
            <a href="{% url 'dogadoption_admin:post_list' %}"
               class="sidebar-link list-group-item list-group-item-action border-0 {% if current == 'post_list' or current == 'create_post' or current == 'claim_requests' or current == 'adoption_requests' or current == 'update_request' %}active{% endif %}">
                <span class="sidebar-icon"><i class="bi bi-house-door-fill"></i></span>
                <span class="sidebar-label">Home</span>
            </a>

            <a href="{% url 'dogadoption_admin:requests' %}"
               class="sidebar-link list-group-item list-group-item-action border-0 {% if current == 'requests' or current == 'update_dog_capture_request' %}active{% endif %}">
                <span class="sidebar-icon"><i class="bi bi-gear-fill"></i></span>
                <span class="sidebar-label">Request</span>
            </a>

            <a href="{% url 'dogadoption_admin:register_dogs' %}"
               class="sidebar-link list-group-item list-group-item-action border-0 {% if current == 'register_dogs' or current == 'registration_record' or current == 'download_registration' or current == 'dog_certificate' or current == 'med_records' or current == 'certificate_print' or current == 'certificate_list' or current == 'export_certificates_pdf' or current == 'export_certificates_word' or current == 'export_certificates_excel' or current == 'export_selected_certificates' or current == 'bulk_certificate_print' or current == 'citation_create' or current == 'citation_print' or current == 'penalty_manage' %}active{% endif %}">
                <span class="sidebar-icon"><i class="bi bi-person-plus-fill"></i></span>
                <span class="sidebar-label">Registration</span>
            </a>

            <a href="{% url 'dogadoption_admin:admin_announcements' %}"
               class="sidebar-link list-group-item list-group-item-action border-0 {% if current == 'admin_announcements' or current == 'announcement_create' or current == 'announcement_comment' or current == 'announcement_edit' or current == 'announcement_delete' or current == 'comment_reply' %}active{% endif %}">
                <span class="sidebar-icon"><i class="bi bi-megaphone-fill"></i></span>
                <span class="sidebar-label">Announcement</span>
            </a>

            <a href="{% url 'dogadoption_admin:admin_users' %}"
               class="sidebar-link list-group-item list-group-item-action border-0 {% if current == 'admin_users' or current == 'admin_user_search' or current == 'admin_user_detail' %}active{% endif %}">
                <span class="sidebar-icon"><i class="bi bi-people-fill"></i></span>
                <span class="sidebar-label">Users</span>
            </a>
            {% endwith %}
        </div>
    </div>
</div>

{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card signup-card">
        <div class="auth-shell">
            <div class="auth-panel">
                <div class="auth-panel-header">
                    <h2>Create Account</h2>
                </div>

                {% if error %}
                <div class="alert alert-danger py-2 mb-3 auth-inline-alert" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ error }}
                </div>
                {% endif %}

                <form method="post" class="signup-form">
                    {% csrf_token %}

                    <div class="mb-2 input-group">
                        <label for="signupPageUsername" class="auth-field-label">Username</label>
                        <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                        <input type="text" id="signupPageUsername" name="username" class="form-control" placeholder="Enter username" value="{{ signup_form_data.username|default:'' }}" required>
                    </div>

                    <div class="mb-2 input-group">
                        <label for="signupPagePassword" class="auth-field-label">Password</label>
                        <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                        <input
                            type="password"
                            id="signupPagePassword"
                            name="password"
                            class="form-control"
                            placeholder="Enter password"
                            minlength="8"
                            autocomplete="new-password"
                            required
                        >
                        <button type="button" class="input-group-text password-toggle" data-password-toggle="signupPagePassword" aria-label="Show password">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>

                    <div class="mb-2 input-group">
                        <label for="signupPageConfirmPassword" class="auth-field-label">Confirm Password</label>
                        <span class="input-group-text"><i class="bi bi-shield-check"></i></span>
                        <input
                            type="password"
                            id="signupPageConfirmPassword"
                            name="confirm_password"
                            class="form-control"
                            placeholder="Confirm password"
                            minlength="8"
                            autocomplete="new-password"
                            required
                        >
                        <button type="button" class="input-group-text password-toggle" data-password-toggle="signupPageConfirmPassword" aria-label="Show password">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>

                    <div class="auth-grid-two">
                        <div class="mb-2 input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" name="first_name" class="form-control" placeholder="First Name" value="{{ signup_form_data.first_name|default:'' }}" required>
                        </div>

                        <div class="mb-2 input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" name="last_name" class="form-control" placeholder="Last Name" value="{{ signup_form_data.last_name|default:'' }}" required>
                        </div>
                    </div>

                    <div class="mb-3 signup-barangay-wrap">
                        <div class="input-group">
                            <label for="signupPageBarangay" class="auth-field-label">Barangay</label>
                            <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
                            <input
                                type="text"
                                name="address"
                                id="signupPageBarangay"
                                class="form-control"
                                placeholder="Enter barangay"
                                value="{{ signup_form_data.address|default:'' }}"
                                autocomplete="off"
                                required
                                data-barangay-autocomplete="true"
                                data-barangay-source-url="{% url 'user:barangay_list_api' %}"
                                data-barangay-suggestions-id="signup-barangay-suggestions"
                                data-barangay-strict="true"
                            >
                        </div>
                        <div id="signup-barangay-suggestions" class="suggestions-box" style="display:none;"></div>
                    </div>

                    <button type="submit" class="login-btn w-100 py-2">
                        Next
                    </button>
                </form>

                <div class="auth-footer">
                    <a href="{% url 'user:login' %}">
                        Already have an account? Log in
                    </a>
                </div>
            </div>

            <div class="auth-illustration" aria-hidden="true">
                <img src="{% static 'images/officialseal.webp' %}" alt="Bayawan City official seal" class="auth-illustration-image">
            </div>
        </div>
    </div>
</div>

<script src="{% static 'js/password_reveal.js' %}"></script>
<script src="{% static 'js/barangay_autocomplete.js' %}"></script>

{% endblock %}

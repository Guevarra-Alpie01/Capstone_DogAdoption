{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/login.css' %}?v=20260328a">
{% endblock %}

{% block content %}
<style>
body {
    background: url("{% static 'images/OIP.webp' %}") no-repeat center center fixed;
    background-size: cover;
    position: relative;
}
</style>

<div class="auth-wrapper d-flex justify-content-center align-items-center">
    <div class="auth-card login-card">
        <div class="auth-shell auth-shell--form-only">
            <div class="auth-panel">
                <div class="auth-panel-header">
                    <h2 class="brand-title">Login</h2>
                </div>

                {% if error %}
                <div class="alert alert-danger text-center auth-inline-alert" role="alert">
                    {{ error }}
                </div>
                {% endif %}

                <form method="post" class="login-form">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ auth_next|default:'' }}" data-auth-next-field>

                    <div class="mb-3 input-group">
                        <label for="loginPageUsername" class="auth-field-label">Username</label>
                        <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                        <input type="text"
                               id="loginPageUsername"
                               name="username"
                               class="form-control"
                               placeholder="Enter username"
                               value="{{ login_form_data.username|default:'' }}"
                               autocomplete="username"
                               required>
                    </div>

                    <div class="mb-3 input-group">
                        <label for="loginPagePassword" class="auth-field-label">Password</label>
                        <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                        <input type="password"
                               id="loginPagePassword"
                               name="password"
                               class="form-control"
                               placeholder="Enter password"
                               autocomplete="current-password"
                               required>
                        <button type="button" class="input-group-text password-toggle" data-password-toggle="loginPagePassword" aria-label="Show password">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>

                    <button type="submit" class="w-100 login-btn py-2 app-btn-fit app-btn-mobile-full">
                        Log In
                    </button>
                </form>

                <div class="auth-divider" aria-hidden="true">
                    <span>or</span>
                </div>

                <a href="{% url 'user:signup' %}" class="d-block text-center create-account-link">
                    Create New Account
                </a>
            </div>
        </div>
    </div>
</div>

<script src="{% static 'js/password_reveal.js' %}"></script>

{% endblock %}

<style>
    .appt-calendar {
        border: 1px solid #dbe5f0;
        border-radius: 20px;
        width: min(100%, 560px);
        margin-inline: auto;
        padding: 14px;
        background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
        box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
    }
    .appt-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 14px;
        margin-bottom: 12px;
    }
    .appt-toolbar strong {
        flex: 1 1 auto;
        margin: 0;
        text-align: center;
        color: #111827;
        font-size: clamp(1rem, 2vw, 1.18rem);
        font-weight: 800;
        letter-spacing: -0.02em;
    }
    .appt-weekdays, .appt-days {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 4px;
    }
    .appt-weekday {
        text-align: center;
        color: #6b7280;
        font-size: 0.72rem;
        line-height: 1.1;
        white-space: nowrap;
    }
    .appt-calendar .appt-day {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        min-height: clamp(34px, 5vw, 46px);
        height: clamp(34px, 5vw, 46px);
        padding: 0;
        background: #f8f9fa;
        font-weight: 600;
        font-size: 0.82rem;
        line-height: 1;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
        word-break: keep-all;
        overflow-wrap: normal;
    }
    .appt-calendar .appt-day.empty {
        border: none;
        background: transparent;
    }
    .appt-calendar .appt-day.unavailable {
        opacity: 0.45;
        cursor: not-allowed;
    }
    .appt-calendar .appt-day.available {
        background: #e7f8ec;
        border-color: #8fd19e;
        cursor: pointer;
    }
    .appt-calendar .appt-day.selected {
        background: #198754;
        border-color: #198754;
        color: #ffffff;
    }
    .claim-nav-btn {
        width: 40px;
        min-width: 40px;
        height: 40px;
        min-height: 40px;
        padding: 0 !important;
        border-radius: 12px !important;
        border: 1px solid #1f4d8f !important;
        background: linear-gradient(180deg, #2f66c9 0%, #1f4d8f 100%) !important;
        color: #ffffff !important;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 1rem;
        font-weight: 800;
        line-height: 1;
        box-shadow: 0 10px 20px rgba(31, 77, 143, 0.26) !important;
        text-shadow: none !important;
    }
    .claim-nav-btn i {
        font-size: 0.95rem;
        line-height: 1;
    }
    .claim-nav-btn:hover,
    .claim-nav-btn:focus {
        border-color: #163f75 !important;
        background: linear-gradient(180deg, #2759b3 0%, #163f75 100%) !important;
        color: #ffffff !important;
        box-shadow: 0 12px 24px rgba(31, 77, 143, 0.3) !important;
    }

    @media (max-width: 480px) {
        .appt-calendar {
            padding: 12px;
            border-radius: 18px;
        }
        .appt-toolbar {
            gap: 10px;
            margin-bottom: 10px;
        }
        .appt-toolbar strong {
            font-size: 1rem;
        }
        .appt-weekdays,
        .appt-days {
            gap: 3px;
        }
        .appt-weekday {
            font-size: 0.66rem;
        }
        .appt-calendar .appt-day {
            min-height: 34px;
            height: 34px;
            font-size: 0.78rem;
            border-radius: 9px;
        }
        .claim-nav-btn {
            width: 36px;
            min-width: 36px;
            height: 36px;
            min-height: 36px;
            border-radius: 10px !important;
        }
        .claim-nav-btn i {
            font-size: 0.88rem;
        }
    }
</style>

<label class="form-label">Preferred Appointment Date</label>
<input type="hidden" id="appointment_date" name="appointment_date" required>

<div class="appt-calendar">
    <div class="appt-toolbar">
        <button type="button" class="btn btn-sm claim-nav-btn" id="prev_month" aria-label="Previous month">
            <i class="bi bi-chevron-left" aria-hidden="true"></i>
        </button>
        <strong id="month_label"></strong>
        <button type="button" class="btn btn-sm claim-nav-btn" id="next_month" aria-label="Next month">
            <i class="bi bi-chevron-right" aria-hidden="true"></i>
        </button>
    </div>
    <div class="appt-weekdays" id="weekdays"></div>
    <div class="appt-days" id="calendar_days"></div>
</div>

{% if available_dates %}
    <div class="form-text mt-2">Green dates are available. Pick one date.</div>
{% else %}
    <div class="form-text text-danger mt-2">No appointment dates are available yet. Please check again later.</div>
{% endif %}

<script>
    (function () {
        const weekdays = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
        const availableDates = new Set([
            {% for slot in available_dates %}"{{ slot.appointment_date|date:'Y-m-d' }}"{% if not forloop.last %}, {% endif %}{% endfor %}
        ]);

        const monthLabel = document.getElementById("month_label");
        const weekdaysEl = document.getElementById("weekdays");
        const daysEl = document.getElementById("calendar_days");
        const prevBtn = document.getElementById("prev_month");
        const nextBtn = document.getElementById("next_month");
        const inputEl = document.getElementById("appointment_date");
        const submitBtn = document.getElementById("{{ submit_btn_id }}");

        if (!monthLabel || !weekdaysEl || !daysEl || !prevBtn || !nextBtn || !inputEl) {
            return;
        }

        const now = new Date();
        const state = {
            currentMonth: new Date(now.getFullYear(), now.getMonth(), 1),
            selectedDate: "",
        };

        weekdaysEl.innerHTML = weekdays.map(day => `<div class="appt-weekday">${day}</div>`).join("");

        function toISO(y, m, d) {
            return `${y}-${String(m + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
        }

        function syncForm() {
            inputEl.value = state.selectedDate;
            if (submitBtn && availableDates.size > 0) {
                submitBtn.disabled = !state.selectedDate;
            }
            inputEl.dispatchEvent(new Event("change", { bubbles: true }));
            document.dispatchEvent(new CustomEvent("appointment-picker:change", {
                detail: { selectedDate: state.selectedDate }
            }));
        }

        function render() {
            const year = state.currentMonth.getFullYear();
            const month = state.currentMonth.getMonth();
            monthLabel.textContent = state.currentMonth.toLocaleDateString(undefined, {
                month: "long",
                year: "numeric",
            });

            const firstDay = new Date(year, month, 1).getDay();
            const monthDays = new Date(year, month + 1, 0).getDate();
            let html = "";

            for (let i = 0; i < firstDay; i++) {
                html += '<button type="button" class="appt-day empty" disabled></button>';
            }

            for (let day = 1; day <= monthDays; day++) {
                const iso = toISO(year, month, day);
                const available = availableDates.has(iso);
                const selected = state.selectedDate === iso;
                const cls = ["appt-day", available ? "available" : "unavailable", selected ? "selected" : ""].join(" ");
                html += `<button type="button" class="${cls}" data-date="${iso}" ${available ? "" : "disabled"}>${day}</button>`;
            }

            daysEl.innerHTML = html;
            daysEl.querySelectorAll(".appt-day.available").forEach((btn) => {
                btn.addEventListener("click", () => {
                    const picked = btn.getAttribute("data-date");
                    state.selectedDate = state.selectedDate === picked ? "" : picked;
                    syncForm();
                    render();
                });
            });
        }

        prevBtn.addEventListener("click", () => {
            state.currentMonth = new Date(state.currentMonth.getFullYear(), state.currentMonth.getMonth() - 1, 1);
            render();
        });

        nextBtn.addEventListener("click", () => {
            state.currentMonth = new Date(state.currentMonth.getFullYear(), state.currentMonth.getMonth() + 1, 1);
            render();
        });

        syncForm();
        render();
    })();
</script>

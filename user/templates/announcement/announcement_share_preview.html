<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post.title|default:"Announcement" }} | Bayawan Vet</title>

    <meta property="og:type" content="article">
    <meta property="og:site_name" content="Bayawan Vet">
    <meta property="og:title" content="{{ post.title|default:'Announcement' }}">
    <meta property="og:description" content="{{ plain_caption }}">
    <meta property="og:image" content="{{ primary_image_url }}">
    <meta property="og:url" content="{{ share_url }}">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ post.title|default:'Announcement' }}">
    <meta name="twitter:description" content="{{ plain_caption }}">
    <meta name="twitter:image" content="{{ primary_image_url }}">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f1f5f9;
            font-family: "Segoe UI", Arial, sans-serif;
            color: #0f172a;
            padding: 16px;
            box-sizing: border-box;
        }

        .share-preview-card {
            width: min(680px, 100%);
            background: #ffffff;
            border: 1px solid #dbe3ed;
            border-radius: 12px;
            box-shadow: 0 14px 28px rgba(15, 23, 42, 0.1);
            overflow: hidden;
        }

        .share-preview-image {
            width: 100%;
            max-height: 360px;
            object-fit: cover;
            display: block;
            background: #e2e8f0;
        }

        .share-preview-content {
            padding: 14px;
        }

        .share-preview-title {
            margin: 0 0 8px;
            font-size: 22px;
            font-weight: 800;
            line-height: 1.25;
        }

        .share-preview-caption {
            margin: 0 0 12px;
            line-height: 1.6;
            color: #334155;
        }

        .open-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 8px;
            background: #1d4ed8;
            color: #ffffff;
            padding: 10px 14px;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <article class="share-preview-card">
        <img src="{{ primary_image_url }}" alt="{{ post.title }}" class="share-preview-image">
        <div class="share-preview-content">
            <h1 class="share-preview-title">{{ post.title }}</h1>
            <p class="share-preview-caption">{{ plain_caption }}</p>
            <a href="{{ detail_url }}" class="open-btn">Open Announcement</a>
        </div>
    </article>
</body>
</html>

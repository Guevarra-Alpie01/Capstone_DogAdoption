{% load static %}

<div class="d-none d-lg-block sidebar-shell" id="sidebar-wrapper">
    <div class="list-group list-group-flush sidebar-menu-list">
        <a href="{% url 'user:user_home'%}" class="list-group-item list-group-item-action border-0 sidebar-nav-link {% if request.resolver_match.url_name == 'user_home' %}is-active{% endif %}">
            <i class="bi bi-house-fill sidebar-nav-icon"></i>
            <span>Home</span>
        </a>
        <a href="{% url 'user:dog_capture_request' %}" class="list-group-item list-group-item-action border-0 sidebar-nav-link {% if request.resolver_match.url_name == 'dog_capture_request' or request.resolver_match.url_name == 'edit_dog_capture_request' or request.resolver_match.url_name == 'delete_dog_capture_request' %}is-active{% endif %}">
            <i class="bi bi-file-earmark-text-fill sidebar-nav-icon"></i>
            <span>Request</span>
        </a>
        <a href="{% url 'user:claim_list' %}" class="list-group-item list-group-item-action border-0 sidebar-nav-link {% if request.resolver_match.url_name == 'claim_list' or request.resolver_match.url_name == 'my_claims' or request.resolver_match.url_name == 'claim_confirm' %}is-active{% endif %}">
            <i class="bi bi-patch-check-fill sidebar-nav-icon"></i>
            <span>Claim</span>
        </a>
        <a href="{% url 'user:announcement_list' %}" class="list-group-item list-group-item-action border-0 sidebar-nav-link {% if request.resolver_match.url_name == 'announcement_list' or request.resolver_match.url_name == 'announcement_detail' or request.resolver_match.url_name == 'announcement_share_preview' %}is-active{% endif %}">
            <i class="bi bi-megaphone-fill sidebar-nav-icon"></i>
            <span>Announcement</span>
        </a>
        <a href="{% url 'user:adopt_list' %}" class="list-group-item list-group-item-action border-0 sidebar-nav-link {% if request.resolver_match.url_name == 'adopt_list' or request.resolver_match.url_name == 'adopt_confirm' or request.resolver_match.url_name == 'adopt_status' or request.resolver_match.url_name == 'adopt_user_post' or request.resolver_match.url_name == 'user_adoption_requests' or request.resolver_match.url_name == 'user_adoption_request_action' %}is-active{% endif %}">
            <i class="bi bi-heart-fill sidebar-nav-icon"></i>
            <span>Adopt</span>
        </a>
    </div>
</div>

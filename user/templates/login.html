{% extends 'base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">
<style>
body {
    background: url("{% static 'images/OIP.webp' %}") no-repeat center center fixed;
    background-size: cover;
    position: relative;
}
</style>


{% if error %}
<div class="alert alert-danger text-center">
    {{ error }}
</div>
{% endif %}

<div class="auth-wrapper d-flex justify-content-center align-items-center">

    <div class="auth-card login-card">

        <h2 class="text-center mb-4 brand-title">Login</h2>

        <form method="post" class="login-form">
            {% csrf_token %}

            <div class="mb-3 input-group">
                <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                <input type="text"
                       name="username"
                       class="form-control"
                       placeholder="Username"
                       required>
            </div>

            <div class="mb-3 input-group">
                <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                <input type="password"
                       id="loginPassword"
                       name="password"
                       class="form-control"
                       placeholder="Password"
                       required>
                <button type="button" class="input-group-text password-toggle" data-password-toggle="loginPassword" aria-label="Show password">
                    <i class="bi bi-eye"></i>
                </button>
            </div>

            <button type="submit" class="w-100 login-btn py-2">
                Log In
            </button>
        </form>

        <div class="text-center my-3">
            <span class="text-muted">or</span>
        </div>

      <a href="{% url 'user:signup' %}" class="w-100 login-btn d-block text-center py-2 create-account-link">
    Create New Account
      </a>


    </div>
</div>

<script src="{% static 'js/password_reveal.js' %}"></script>

{% endblock %}

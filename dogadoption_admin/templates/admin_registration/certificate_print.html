{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog Vaccination Certificate</title>
    <link rel="stylesheet" href="{% static 'css/register/small_certificate.css' %}">
</head>
<body>
    <div class="small-certificate-toolbar">
        <a class="back-link" href="{% url 'dogadoption_admin:certificate_list' %}" onclick="return goBackToCertificateList(event)">Back to Certificate List</a>
        <button class="print-btn" type="button" onclick="window.print()">Print Certificate</button>
    </div>

    <main class="small-certificate-stack">
        {% with cert=certificate %}
            {% include 'admin_registration/partials/small_certificate_sheet.html' %}
        {% endwith %}
    </main>

    <script>
    function goBackToCertificateList(event) {
        const fallbackUrl = event.currentTarget.href;

        if (document.referrer && document.referrer !== window.location.href) {
            event.preventDefault();
            window.history.back();
            return false;
        }

        return true;
    }
    </script>
</body>
</html>

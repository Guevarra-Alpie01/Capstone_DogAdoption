{% load static %}

<div class="d-none d-lg-block" id="sidebar-wrapper">
    <div class="sidebar-inner">
        <div class="sidebar-header">
            <div class="sidebar-title">Main Menu</div>
            <div class="sidebar-subtitle">Dog Adoption Portal</div>
        </div>

        <div class="list-group list-group-flush sidebar-nav">
            {% with current=request.resolver_match.url_name %}
            <a href="{% url 'user:user_home' %}"
               class="sidebar-link list-group-item list-group-item-action border-0 {% if current == 'user_home' or current == 'post_detail' %}active{% endif %}">
                <span class="sidebar-icon"><i class="bi bi-house-fill"></i></span>
                <span class="sidebar-label">Home</span>
            </a>

            <a href="{% url 'user:dog_capture_request' %}"
               class="sidebar-link list-group-item list-group-item-action border-0 {% if current == 'dog_capture_request' %}active{% endif %}">
                <span class="sidebar-icon"><i class="bi bi-send-fill"></i></span>
                <span class="sidebar-label">Request</span>
            </a>

            <a href="{% url 'user:my_claims' %}"
               class="sidebar-link list-group-item list-group-item-action border-0 {% if current == 'my_claims' or current == 'claim_confirm' %}active{% endif %}">
                <span class="sidebar-icon"><i class="bi bi-clipboard-check-fill"></i></span>
                <span class="sidebar-label">Claim</span>
            </a>

            <a href="{% url 'user:announcement_list' %}"
               class="sidebar-link list-group-item list-group-item-action border-0 {% if current == 'announcement_list' or current == 'announcement_comment' %}active{% endif %}">
                <span class="sidebar-icon"><i class="bi bi-megaphone-fill"></i></span>
                <span class="sidebar-label">Announcement</span>
            </a>

            <a href="{% url 'user:adopt_list' %}"
               class="sidebar-link list-group-item list-group-item-action border-0 {% if current == 'adopt_list' or current == 'adopt_confirm' or current == 'adopt_status' %}active{% endif %}">
                <span class="sidebar-icon"><i class="bi bi-life-preserver"></i></span>
                <span class="sidebar-label">Adopt</span>
            </a>
            {% endwith %}
        </div>
    </div>
</div>

{% load static %}
<div class="user-ann-mobile-tabs announcement-mobile-tabs announcement-mobile-tabs--compact-stack"
     data-user-mobile-announcement-tabs
     data-mobile-announcement-tabs
     aria-label="Announcement sections">
    {% if announcement_dog_info_page %}
    <a href="{% url 'user:announcement_list' %}?tab=pinned"
       class="user-ann-mobile-tab announcement-mobile-tab announcement-mobile-tab--compact user-ann-subnav-as-link user-ann-mobile-tab--mobile-only">
        <span class="user-ann-subnav__inner">
            <i class="bi bi-pin-angle-fill user-ann-bi" aria-hidden="true"></i>
            <span class="user-ann-subnav__label">Pinned</span>
        </span>
    </a>
    <a href="{% url 'user:announcement_list' %}"
       class="user-ann-mobile-tab announcement-mobile-tab announcement-mobile-tab--compact user-ann-subnav-as-link">
        <span class="user-ann-subnav__inner">
            <i class="bi bi-newspaper user-ann-bi" aria-hidden="true"></i>
            <span class="user-ann-subnav__label">Main Feed</span>
        </span>
    </a>
    <a href="{% url 'user:announcement_dog_info' %}"
       class="user-ann-mobile-tab announcement-mobile-tab announcement-mobile-tab--compact user-ann-subnav-as-link is-active"
       aria-current="page">
        <span class="user-ann-subnav__inner">
            <i class="bi bi-info-circle user-ann-bi" aria-hidden="true"></i>
            <span class="user-ann-subnav__label">Dog Info</span>
        </span>
    </a>
    {% else %}
    <button type="button"
            class="user-ann-mobile-tab announcement-mobile-tab announcement-mobile-tab--compact user-ann-mobile-tab--mobile-only"
            data-user-mobile-announcement-tab="pinned"
            aria-pressed="false">
        <span class="user-ann-subnav__inner">
            <i class="bi bi-pin-angle-fill user-ann-bi" aria-hidden="true"></i>
            <span class="user-ann-subnav__label">Pinned</span>
        </span>
    </button>
    <button type="button"
            class="user-ann-mobile-tab announcement-mobile-tab announcement-mobile-tab--compact"
            data-user-mobile-announcement-tab="regular"
            aria-pressed="true">
        <span class="user-ann-subnav__inner">
            <i class="bi bi-newspaper user-ann-bi" aria-hidden="true"></i>
            <span class="user-ann-subnav__label">Main Feed</span>
        </span>
    </button>
    <a href="{% url 'user:announcement_dog_info' %}"
       class="user-ann-mobile-tab announcement-mobile-tab announcement-mobile-tab--compact user-ann-subnav-as-link">
        <span class="user-ann-subnav__inner">
            <i class="bi bi-info-circle user-ann-bi" aria-hidden="true"></i>
            <span class="user-ann-subnav__label">Dog Info</span>
        </span>
    </a>
    {% endif %}
</div>

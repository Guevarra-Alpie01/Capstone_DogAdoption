<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post.title|default:"Announcement" }} | Bayawan Vet</title>

    <meta property="og:type" content="article">
    <meta property="og:site_name" content="Bayawan Vet">
    <meta property="og:title" content="{{ post.title|default:'Announcement' }}">
    <meta property="og:description" content="{{ plain_caption }}">
    <meta property="og:image" content="{{ primary_image_url }}">
    <meta property="og:url" content="{{ share_url }}">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ post.title|default:'Announcement' }}">
    <meta name="twitter:description" content="{{ plain_caption }}">
    <meta name="twitter:image" content="{{ primary_image_url }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            color-scheme: light;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background:
                radial-gradient(circle at top left, rgba(255, 244, 184, 0.8), transparent 32%),
                linear-gradient(135deg, #f8fbff 0%, #eef5ff 56%, #fffef8 100%);
            font-family: "Manrope", sans-serif;
            color: #102746;
        }

        .share-preview-shell {
            width: min(760px, 100%);
            border-radius: 28px;
            border: 1px solid #d4e0ef;
            background: rgba(255, 255, 255, 0.94);
            box-shadow: 0 26px 56px rgba(15, 23, 42, 0.12);
            overflow: hidden;
        }

        .share-preview-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            display: block;
            background: #e8eef7;
        }

        .share-preview-content {
            display: grid;
            gap: 14px;
            padding: 20px;
        }

        .share-preview-kicker,
        .share-preview-category {
            display: inline-flex;
            width: fit-content;
            align-items: center;
            gap: 0.5rem;
            padding: 0.48rem 0.82rem;
            border-radius: 999px;
            font-size: 0.76rem;
            font-weight: 800;
            letter-spacing: 0.09em;
            text-transform: uppercase;
        }

        .share-preview-kicker {
            background: #e7f0ff;
            color: #1d4ed8;
        }

        .share-preview-category {
            background: #eef5fb;
            color: #5a708c;
        }

        .share-preview-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
        }

        .share-preview-title {
            margin: 0;
            font-family: "Fraunces", serif;
            font-size: clamp(1.8rem, 3vw, 2.6rem);
            line-height: 1.12;
            letter-spacing: -0.02em;
            color: #102746;
        }

        .share-preview-caption {
            margin: 0;
            color: #475f7c;
            line-height: 1.8;
            font-size: 1rem;
        }

        .share-preview-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.85rem;
        }

        .open-btn,
        .secondary-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.55rem;
            min-height: 46px;
            padding: 0.82rem 1.15rem;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 800;
        }

        .open-btn {
            background: linear-gradient(135deg, #1f5da8, #123d79);
            color: #ffffff;
        }

        .secondary-btn {
            border: 1px solid #d7e0eb;
            background: #ffffff;
            color: #244567;
        }
    </style>
</head>
<body>
    <article class="share-preview-shell">
        <img src="{{ primary_image_url }}" alt="{{ post.title }}" class="share-preview-image">
        <div class="share-preview-content">
            <div class="share-preview-row">
                <span class="share-preview-kicker">Bayawan Vet</span>
                <span class="share-preview-category">{{ post.get_category_display }}</span>
            </div>
            <h1 class="share-preview-title">{{ post.title }}</h1>
            <p class="share-preview-caption">{{ plain_caption }}</p>
            <div class="share-preview-actions">
                <a href="{{ detail_url }}" class="open-btn">Open Announcement</a>
                <a href="{{ share_url }}" class="secondary-btn">Preview Link</a>
            </div>
        </div>
    </article>
</body>
</html>

{% load static %}

<div class="sidebar-shell user-mobile-sidebar d-lg-none" id="sidebar-wrapper" aria-label="Primary navigation">
    <div class="sidebar-mobile-header">
        <a class="sidebar-mobile-brand" href="{% url 'user:user_home' %}" aria-label="Bayawan Vet home">
            <img src="{% static 'images/vetclinic-logo.png' %}" alt="" aria-hidden="true" class="sidebar-mobile-brand__logo">
            <span class="sidebar-mobile-brand__headline">Bayawan Vet</span>
        </a>
        <button type="button" class="sidebar-mobile-close" data-sidebar-close aria-label="Close navigation menu">
            <span class="sidebar-mobile-close__line sidebar-mobile-close__line--first"></span>
            <span class="sidebar-mobile-close__line sidebar-mobile-close__line--second"></span>
        </button>
    </div>
    <div class="list-group list-group-flush sidebar-menu-list">
        {% include 'partials/user_primary_nav_links.html' with nav_item_class='list-group-item list-group-item-action border-0 sidebar-nav-link' nav_icon_class='sidebar-nav-icon' show_icons=True %}
        {% if user.is_authenticated %}
        <form method="post" action="{% url 'user:logout' %}" class="sidebar-nav-logout-form m-0 w-100" data-confirm-modal
            data-confirm-title="Confirm Logout"
            data-confirm-message="Are you sure you want to log out?"
            data-confirm-submit-label="Log Out">
            {% csrf_token %}
            <button type="submit" class="list-group-item list-group-item-action border-0 sidebar-nav-link w-100 text-start">
                <i class="bi bi-box-arrow-right sidebar-nav-icon" aria-hidden="true"></i>
                <span>Log out</span>
            </button>
        </form>
        {% endif %}
    </div>
</div>
